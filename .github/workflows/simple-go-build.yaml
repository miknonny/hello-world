name: Simple Go build

on:
  push:
    branches:
      - main
      
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Go version
        uses: action/setup-go@v2
        with:
          go-version: '1.22.0'

      - name: run app
        working-directory: hello-world
        run: go run main.go
